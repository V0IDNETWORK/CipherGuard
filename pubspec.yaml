name: cipherguard
description: CipherGuard - Premium AES-256-GCM Security Suite
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Cryptography
  crypto: ^3.0.3
  encrypt: ^5.0.3

  # Secure storage & auth
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0

  # Preferences & links
  shared_preferences: ^2.3.3
  url_launcher: 6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true